name: Check
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true
jobs:
  output-directory:
    # Regression test for #27: PlantUML must work when LaTeX is run with
    # -output-directory. Compiles every example into ./out with both engines and
    # checks that the resulting PDF lands in that directory.
    strategy:
      fail-fast: false
      matrix:
        engine: [lualatex, pdflatex]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      # PlantUML is pinned; bump the version here (see CLAUDE.md). The cache is
      # keyed on the version, so a bump fetches the new jar automatically.
      - name: Set PlantUML version
        id: plantuml-version
        run: echo "version=1.2026.6" >> "$GITHUB_OUTPUT"
      - name: Download PlantUML jar (cached)
        id: plantuml-jar
        uses: ethanjli/cached-download-action@v0.1.4
        with:
          url: https://github.com/plantuml/plantuml/releases/download/v${{ steps.plantuml-version.outputs.version }}/plantuml-${{ steps.plantuml-version.outputs.version }}.jar
          destination: /tmp/plantuml/plantuml-${{ steps.plantuml-version.outputs.version }}.jar
          cache-key: plantuml-${{ steps.plantuml-version.outputs.version }}.jar
      - name: Set PLANTUML_JAR
        run: echo "PLANTUML_JAR=${{ steps.plantuml-jar.outputs.destination }}" >> "$GITHUB_ENV"
      - uses: actions/checkout@v6
      - uses: awalsh128/cache-apt-pkgs-action@v1.6.1
        with:
          packages: graphviz inkscape
          version: 1.1
          execute_install_scripts: true
      # cache-apt-pkgs-action restores graphviz from cached .debs without running
      # its post-install "dot -c", leaving the plugin config missing -> dot emits
      # broken output and PlantUML throws UnparsableGraphvizException. Regenerate it.
      - name: Configure graphviz plugins
        run: sudo dot -c
      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
          package_file: tl_packages
      - name: Compile examples with -output-directory
        run: |
          mkdir -p out
          for example in \
            example-class-relations--latex \
            example-class-relations--svg \
            example-class-visibility--latex \
            example-class-visibility--png \
            example-class-visibility--svg \
            example-component-diagram \
            example-minimal \
            example-multiple-diagrams-svg; do
            echo "::group::${{ matrix.engine }} -output-directory=out $example"
            ${{ matrix.engine }} -shell-escape -interaction=nonstopmode -halt-on-error -output-directory=out "$example"
            echo "::endgroup::"
            test -f "out/$example.pdf" || { echo "::error::out/$example.pdf was not produced"; exit 1; }
          done
      - uses: actions/upload-artifact@v7
        with:
          name: output-directory-${{ matrix.engine }}
          path: out/*.pdf
  server:
    # Regression test for #6: render diagrams through a PlantUML server instead of
    # a local plantuml.jar. A plantuml-server container provides the HTTP API and
    # PLANTUML_JAR is deliberately left unset, proving the server path needs no
    # local Java/PlantUML install. Only png and svg go through the server (the
    # server cannot produce latex/TikZ output), so those are the examples here.
    strategy:
      fail-fast: false
      matrix:
        engine: [lualatex, pdflatex]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      plantuml:
        image: plantuml/plantuml-server:jetty
        ports:
          - 8080:8080
    steps:
      - uses: actions/checkout@v6
      # inkscape converts the SVG diagram to PDF; graphviz/java are not needed
      # locally because the server does the rendering.
      - uses: awalsh128/cache-apt-pkgs-action@v1.6.1
        with:
          packages: inkscape
          version: 1.1
          execute_install_scripts: true
      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
          package_file: tl_packages
      - name: Wait for the PlantUML server
        # ~h<hex> is the encoded source "@startuml\nA->B:x\n@enduml\n".
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://localhost:8080/svg/~h407374617274756d6c0a412d3e423a780a40656e64756d6c0a" || true)
            [ "$code" = "200" ] && { echo "server ready"; exit 0; }
            sleep 2
          done
          echo "::error::PlantUML server did not become ready"; exit 1
      - name: Compile server examples (no PLANTUML_JAR)
        run: |
          for example in example-server--png example-server--svg; do
            echo "::group::${{ matrix.engine }} $example"
            ${{ matrix.engine }} -shell-escape -interaction=nonstopmode -halt-on-error "$example"
            echo "::endgroup::"
            test -f "$example.pdf" || { echo "::error::$example.pdf was not produced"; exit 1; }
          done
      - uses: actions/upload-artifact@v7
        with:
          name: server-${{ matrix.engine }}
          path: example-server--*.pdf
