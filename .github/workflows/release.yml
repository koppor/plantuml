name: Release
on:
  pull_request:
  push:
    branches:
      main
concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.ref }}"
  cancel-in-progress: true
jobs:
  ctan:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6
      - name: release.sh
        # We need java, pandoc, and more, which is not provided directly by the image
        uses: dante-ev/latex-action@edge
        with:
          entrypoint: ./release.sh
      - uses: actions/upload-artifact@v7
        with:
          name: ctan
          path: plantuml.tar.gz
  build_pdflatex:
    # Regression guard for pdfLaTeX support (issue #1). Mirrors build_and_ghpages
    # but compiles the examples with pdflatex instead of lualatex.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Set PlantUML version
        id: plantuml-version
        run: echo "version=1.2026.6" >> "$GITHUB_OUTPUT"
      - name: Download PlantUML jar (cached)
        id: plantuml-jar
        uses: ethanjli/cached-download-action@v0.1.4
        with:
          url: https://github.com/plantuml/plantuml/releases/download/v${{ steps.plantuml-version.outputs.version }}/plantuml-${{ steps.plantuml-version.outputs.version }}.jar
          destination: /tmp/plantuml/plantuml-${{ steps.plantuml-version.outputs.version }}.jar
          cache-key: plantuml-${{ steps.plantuml-version.outputs.version }}.jar
      - name: Set PLANTUML_JAR
        run: echo "PLANTUML_JAR=${{ steps.plantuml-jar.outputs.destination }}" >> "$GITHUB_ENV"
      - uses: actions/checkout@v6
      - uses: awalsh128/cache-apt-pkgs-action@v1.6.1
        with:
          packages: graphviz inkscape
          version: 1.1
          execute_install_scripts: true
      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
           package_file: tl_packages
      - name: example-class-relations--latex
        run: pdflatex -shell-escape example-class-relations--latex
      - name: example-class-relations--svg
        run: pdflatex -shell-escape example-class-relations--svg
      - name: example-class-visibility
        run: pdflatex -shell-escape example-class-visibility
      - name: example-component-diagram
        run: pdflatex -shell-escape example-component-diagram
      - name: example-minimal
        run: pdflatex -shell-escape example-minimal.tex
      - name: example-multiple-diagrams-svg
        run: pdflatex -shell-escape example-multiple-diagrams-svg
      - uses: actions/upload-artifact@v6
        with:
          name: pdflatex-pdfs
          path: example-*.pdf
  build_and_ghpages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Set PlantUML version
        id: plantuml-version
        run: echo "version=1.2026.6" >> "$GITHUB_OUTPUT"
      - name: Download PlantUML jar (cached)
        id: plantuml-jar
        uses: ethanjli/cached-download-action@v0.1.4
        with:
          url: https://github.com/plantuml/plantuml/releases/download/v${{ steps.plantuml-version.outputs.version }}/plantuml-${{ steps.plantuml-version.outputs.version }}.jar
          destination: /tmp/plantuml/plantuml-${{ steps.plantuml-version.outputs.version }}.jar
          cache-key: plantuml-${{ steps.plantuml-version.outputs.version }}.jar
      - name: Set PLANTUML_JAR
        run: echo "PLANTUML_JAR=${{ steps.plantuml-jar.outputs.destination }}" >> "$GITHUB_ENV"
      - uses: actions/checkout@v6
      - uses: awalsh128/cache-apt-pkgs-action@v1.6.1
        with:
          packages: graphviz inkscape
          version: 1.1
          execute_install_scripts: true
      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
           package_file: tl_packages
      - name: example-class-relations--latex
        run: lualatex -shell-escape example-class-relations--latex
      - name: example-class-relations--svg
        run: lualatex -shell-escape example-class-relations--svg
      - name: example-class-visibility
        run: lualatex -shell-escape example-class-visibility
      - name: example-component-diagram
        run: lualatex -shell-escape example-component-diagram
      - name: example-minimal
        run: lualatex -shell-escape example-minimal.tex
      - name: example-multiple-diagrams-svg
        run: lualatex -shell-escape example-multiple-diagrams-svg
      - name: Gather build artifacts
        run: |
          mkdir build
          mv example-*.pdf build/
          mv example-*.png build/
          cp -r README.md .github/_config.yml build/
      - name: Publish to GitHub pages
        if: github.ref == 'refs/heads/main'
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: gh-pages
          build_dir: build/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v7
        if: github.ref != 'refs/heads/main'
        with:
          name: gh-pages
          path: build/
